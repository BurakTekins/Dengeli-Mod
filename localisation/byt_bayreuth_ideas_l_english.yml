 byt_franconian_drill:0 "Franconian Drill"
 byt_franconian_drill_desc:0 "The rolling hills of Franconia have bred hardy footmen. Through relentless drill and discipline, our infantry will stand firm where others break."
 byt_red_main_commerce:0 "Commerce of the Red Main"
 byt_red_main_commerce_desc:0 "The Red Main river ties Bayreuth to the great trade arteries of the Empire. By fostering our markets and merchants, we shall draw wealth into the margraviate."
