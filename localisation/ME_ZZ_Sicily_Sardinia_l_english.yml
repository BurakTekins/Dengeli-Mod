l_english:
 sic_subjugate_sardinia_title: "Pronoia of Sardinia"
 sic_subjugate_sardinia_desc: "The Norman kings of Sicily inherited much from the Greek administration of the South, and the Byzantine institution of the pronoia is well suited to bind the restless lords of Sardinia to our crown. By cultivating the deepest friendship with the court of Sardinia and securing their lasting obligations to us, we shall draw the island into our orbit not as a conquered land, but as a loyal pronoiar bound in military service to the King of Sicily."
 sic_subjugate_knights_title: "Pronoia of the Knights"
 sic_subjugate_knights_desc: "The Knights of the Order, masters of their island fortress, are the finest soldiers of the Mediterranean. Should we bind their friendship and place them under our obligation, they would serve our crown not as a foreign order but as a sworn pronoiar, their galleys and lances answering to the King of Sicily."
 sic_subjugate_naxos_title: "Pronoia of Naxos"
 sic_subjugate_naxos_desc: "The Duchy of the Archipelago, scattered across the jewels of the Aegean, has long drifted in the shadow of greater powers. Freed of its old masters and won over by our patronage, Naxos shall enter our orbit as a pronoiar, its isles binding our reach into the eastern seas."
 sic_subjugate_cyprus_title: "Pronoia of Cyprus"
 sic_subjugate_cyprus_desc: "Rich Cyprus, the easternmost outpost of Latin Christendom, commands the crossroads of the Levant. By the deepest friendship and the weight of favours owed, we shall draw the Cypriot crown into ours as a loyal pronoiar, completing the chain of island realms bound in service to the King of Sicily."
